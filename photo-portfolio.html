<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hirsty Productions - Photography Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #fff;
      overflow-x: hidden;
    }
    
    .header {
      padding: 3rem 2rem;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      text-align: center;
      color: white;
    }
    
    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    
    .header p {
      font-size: 1.1rem;
      opacity: 0.8;
    }
    
    /* PROPER MASONRY GRID */
    .gallery {
      padding: 3rem 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
      columns: 3 320px;
      column-gap: 15px;
    }
    
    .photo {
      display: inline-block;
      width: 100%;
      margin-bottom: 15px;
      break-inside: avoid;
      cursor: pointer;
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    
    .photo:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
    }
    
    .photo img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.3s ease;
    }
    
    .photo:hover img {
      transform: scale(1.03);
    }
    
    /* FULL SCREEN LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.98);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    
    .lightbox.active {
      display: flex;
    }
    
    .lightbox img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
    }
    
    .lightbox-close {
      position: fixed;
      top: 25px;
      right: 35px;
      width: 60px;
      height: 60px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      color: white;
      font-size: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      transition: all 0.2s ease;
      font-weight: 300;
    }
    
    .lightbox-close:hover {
      background: rgba(0, 0, 0, 0.9);
      border-color: rgba(255, 255, 255, 0.6);
      transform: rotate(90deg);
    }
    
    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 70px;
      height: 70px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      color: white;
      font-size: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      transition: all 0.3s ease;
    }
    
    .lightbox-nav:hover {
      background: rgba(0, 0, 0, 0.9);
      border-color: rgba(255, 255, 255, 0.6);
      transform: translateY(-50%) scale(1.1);
    }
    
    .lightbox-prev {
      left: 40px;
    }
    
    .lightbox-next {
      right: 40px;
    }
    
    @media (max-width: 768px) {
      .gallery {
        columns: 1;
      }
      
      .header h1 {
        font-size: 2rem;
      }
      
      .lightbox-nav {
        width: 55px;
        height: 55px;
      }
      
      .lightbox-prev {
        left: 15px;
      }
      
      .lightbox-next {
        right: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Photography Portfolio</h1>
    <p>Sports & Event Photography</p>
  </div>

  <div class="gallery" id="gallery"></div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" onclick="closeLightbox()">&times;</div>
    <div class="lightbox-nav lightbox-prev" onclick="prevImage()">‹</div>
    <img src="" alt="Full size photo" id="lightbox-img">
    <div class="lightbox-nav lightbox-next" onclick="nextImage()">›</div>
  </div>

  <script>
    // Photo data
    const photos = [];
    const fivesCount = 70;
    const asideCount = 47;
    
    // Generate photo array (alternating Fives and 11-aside)
    for (let i = 1; i <= Math.max(fivesCount, asideCount); i++) {
      if (i <= fivesCount) {
        photos.push({
          src: `webphotos/Fives/Fives Photo ${i}.webp`,
          alt: 'Fives football photography'
        });
      }
      if (i <= asideCount) {
        photos.push({
          src: `webphotos/11aside/11-a-side photo ${i}.webp`,
          alt: '11-a-side football photography'
        });
      }
    }
    
    // Render gallery
    const gallery = document.getElementById('gallery');
    photos.forEach((photo, index) => {
      const div = document.createElement('div');
      div.className = 'photo';
      div.onclick = () => openLightbox(index);
      
      const img = document.createElement('img');
      img.src = photo.src;
      img.alt = photo.alt;
      img.loading = 'lazy';
      
      div.appendChild(img);
      gallery.appendChild(div);
    });
    
    // Lightbox functionality
    let currentIndex = 0;
    
    function openLightbox(index) {
      currentIndex = index;
      document.getElementById('lightbox-img').src = photos[index].src;
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = 'auto';
    }
    
    function prevImage() {
      currentIndex = (currentIndex - 1 + photos.length) % photos.length;
      document.getElementById('lightbox-img').src = photos[currentIndex].src;
    }
    
    function nextImage() {
      currentIndex = (currentIndex + 1) % photos.length;
      document.getElementById('lightbox-img').src = photos[currentIndex].src;
    }
    
    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      if (!document.getElementById('lightbox').classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'ArrowRight') nextImage();
    });
    
    // Click outside to close
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') closeLightbox();
    });
  </script>
</body>
</html>
