    /* Clean Masonry Grid */
    body {
      background: #fff;
    }
    
    .portfolio-header {
      padding: 8rem 0 3rem;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      text-align: center;
    }
    
    .portfolio-header .section-title {
      color: white;
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    
    .portfolio-subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.1rem;
      margin-top: 1rem;
    }
    
    /* MASONRY GRID */
    .photo-grid {
      max-width: 1400px;
      margin: 0 auto;
      padding: 4rem 2rem;
      columns: 3 320px;
      column-gap: 15px;
    }
    
    .photo-item {
      display: inline-block;
      width: 100%;
      margin-bottom: 15px;
      break-inside: avoid;
      cursor: pointer;
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    
    .photo-item:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
    }
    
    .photo-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.3s ease;
    }
    
    .photo-item:hover img {
      transform: scale(1.03);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .photo-grid {
        columns: 1;
        padding: 2rem 1rem;
      }
    }
    
    /* FULL SCREEN LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.98);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }
    
    .lightbox.active {
      display: flex;
    }
    
    .lightbox img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
    }
    
    .lightbox-close {
      position: fixed;
      top: 25px;
      right: 35px;
      width: 60px;
      height: 60px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      color: white;
      font-size: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10001;
      transition: all 0.2s ease;
      font-weight: 300;
    }
    
    .lightbox-close:hover {
      background: rgba(0, 0, 0, 0.9);
      border-color: rgba(255, 255, 255, 0.6);
      transform: rotate(90deg);
    }
    
    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 70px;
      height: 70px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      color: white;
      font-size: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10001;
      transition: all 0.3s ease;
    }
    
    .lightbox-nav:hover {
      background: rgba(0, 0, 0, 0.9);
      border-color: rgba(255, 255, 255, 0.6);
      transform: translateY(-50%) scale(1.1);
    }
    
    .lightbox-prev {
      left: 40px;
    }
    
    .lightbox-next {
      right: 40px;
    }
    
    @media (max-width: 768px) {
      .lightbox-nav {
        width: 55px;
        height: 55px;
      }
      
      .lightbox-prev {
        left: 15px;
      }
      
      .lightbox-next {
        right: 15px;
      }
    }
  </style>

  <script src="script.js"></script>
  
  <script>
    const photos = [];
    const fivesCount = 70;
    const asideCount = 47;
    
    for (let i = 1; i <= Math.max(fivesCount, asideCount); i++) {
      if (i <= fivesCount) {
        photos.push(`webphotos/Fives/Fives Photo ${i}.webp`);
      }
      if (i <= asideCount) {
        photos.push(`webphotos/11aside/11-a-side photo ${i}.webp`);
      }
    }
    
    const gallery = document.getElementById('photoGrid');
    photos.forEach((src, index) => {
      const div = document.createElement('div');
      div.className = 'photo-item';
      div.onclick = () => openLightbox(index);
      
      const img = document.createElement('img');
      img.src = src;
      img.alt = '';
      img.loading = 'lazy';
      
      div.appendChild(img);
      gallery.appendChild(div);
    });
    
    let currentIndex = 0;
    
    function openLightbox(index) {
      currentIndex = index;
      document.getElementById('lightbox-img').src = photos[index];
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = 'auto';
    }
    
    function prevImage() {
      currentIndex = (currentIndex - 1 + photos.length) % photos.length;
      document.getElementById('lightbox-img').src = photos[currentIndex];
    }
    
    function nextImage() {
      currentIndex = (currentIndex + 1) % photos.length;
      document.getElementById('lightbox-img').src = photos[currentIndex];
    }
    
    document.addEventListener('keydown', (e) => {
      if (!document.getElementById('lightbox').classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'ArrowRight') nextImage();
    });
    
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') closeLightbox();
    });
  </script>
